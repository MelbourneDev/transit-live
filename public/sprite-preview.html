h2 { color: #34d399; font-size: 14px; margin-top: 30px; }
.sprite-row { display: flex; gap: 40px; flex-wrap: wrap; margin: 20px 0; }
.sprite-box { text-align: center; }
.sprite-box canvas { image-rendering: pixelated; border: 1px solid #2a2010; }

function drawSprite(rows, scale, palOverrides) {
  const p = { ...PAL, ...palOverrides };
  const h = rows.length;
  const w = Math.max(...rows.map(r => r.length));
  const canvas = document.createElement('canvas');
  canvas.width = w * scale;
  canvas.height = h * scale;
  canvas.style.width = (w * scale) + 'px';
  canvas.style.height = (h * scale) + 'px';
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < rows[y].length; x++) {
      const c = p[rows[y][x]];
      if (!c) continue;
      ctx.fillStyle = c;
      ctx.fillRect(x * scale, y * scale, scale, scale);
    }
  }
  return canvas;
}

function addSprite(containerId, name, rows, scale, palOverrides) {
  const box = document.createElement('div');
  box.className = 'sprite-box';
  box.appendChild(drawSprite(rows, scale || 6, palOverrides));
  const label = document.createElement('p');
  label.textContent = name;
  box.appendChild(label);
  document.getElementById(containerId).appendChild(box);
}

// Vehicles
